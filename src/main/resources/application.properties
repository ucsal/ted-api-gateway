spring.application.name=ted-api-gateway
server.port=8080

spring.profiles.active=prod

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

spring.cloud.gateway.routes[0].id=ted-professor-service
spring.cloud.gateway.routes[0].uri=lb://TED-PROFESSOR-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/professors/**

spring.cloud.gateway.routes[1].id=ted-aluno-service
spring.cloud.gateway.routes[1].uri=lb://TED-ALUNO-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/students/**

spring.cloud.gateway.routes[2].id=ted-projeto-service
spring.cloud.gateway.routes[2].uri=lb://TED-PROJETO-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/projects/**

spring.cloud.gateway.routes[3].id=ted-grupo-service
spring.cloud.gateway.routes[3].uri=lb://TED-GRUPO-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/groups/**

spring.cloud.gateway.routes[4].id=ted-auth-service
spring.cloud.gateway.routes[4].uri=lb://TED-AUTH-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/auth/**

# Rotas dos docs
spring.cloud.gateway.routes[5].id=professor-docs
spring.cloud.gateway.routes[5].uri=lb://TED-PROFESSOR-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/professor/v3/api-docs
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/professor/v3/api-docs, /v3/api-docs

spring.cloud.gateway.routes[6].id=aluno-docs
spring.cloud.gateway.routes[6].uri=lb://TED-ALUNO-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/aluno/v3/api-docs
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/aluno/v3/api-docs, /v3/api-docs

spring.cloud.gateway.routes[7].id=projeto-docs
spring.cloud.gateway.routes[7].uri=lb://TED-PROJETO-SERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/projeto/v3/api-docs
spring.cloud.gateway.routes[7].filters[0]=RewritePath=/projeto/v3/api-docs, /v3/api-docs

spring.cloud.gateway.routes[8].id=grupo-docs
spring.cloud.gateway.routes[8].uri=lb://TED-GRUPO-SERVICE
spring.cloud.gateway.routes[8].predicates[0]=Path=/grupo/v3/api-docs
spring.cloud.gateway.routes[8].filters[0]=RewritePath=/grupo/v3/api-docs, /v3/api-docs

spring.cloud.gateway.routes[9].id=auth-docs
spring.cloud.gateway.routes[9].uri=lb://TED-AUTH-SERVICE
spring.cloud.gateway.routes[9].predicates[0]=Path=/auth/v3/api-docs
spring.cloud.gateway.routes[9].filters[0]=RewritePath=/auth/v3/api-docs, /v3/api-docs

# Swagger UI agregado
springdoc.swagger-ui.urls[0].name=Professor Service
springdoc.swagger-ui.urls[0].url=/professor/v3/api-docs

springdoc.swagger-ui.urls[1].name=Aluno Service
springdoc.swagger-ui.urls[1].url=/aluno/v3/api-docs

springdoc.swagger-ui.urls[2].name=Projeto Service
springdoc.swagger-ui.urls[2].url=/projeto/v3/api-docs

springdoc.swagger-ui.urls[3].name=Grupo Service
springdoc.swagger-ui.urls[3].url=/grupo/v3/api-docs

springdoc.swagger-ui.urls[4].name=Auth Service
springdoc.swagger-ui.urls[4].url=/auth/v3/api-docs